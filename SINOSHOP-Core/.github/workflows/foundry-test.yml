name: Foundry Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Force install missing dependencies
        run: |
          # 如果 forge-std 子模块是空的，直接用 forge install 安装（使用 --no-git 避免交互）
          if [ ! -f "lib/forge-std/src/Test.sol" ]; then
            echo "forge-std 子模块缺失，正在用 forge install 安装..."
            rm -rf lib/forge-std
            forge install foundry-rs/forge-std --no-git
          fi
          if [ ! -d "lib/openzeppelin-contracts/contracts" ]; then
            echo "openzeppelin-contracts 缺失，正在安装..."
            rm -rf lib/openzeppelin-contracts
            forge install OpenZeppelin/openzeppelin-contracts --no-git
          fi
          # 刷新 remappings
          forge remappings > remappings.txt

      - name: Run all tests with gas report
        run: |
          forge clean
          forge build
          forge test -vvv --gas-report
